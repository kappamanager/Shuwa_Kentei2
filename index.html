<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚館＜手話検定シミュレーター＞</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- TOP PAGE -->
        <div id="screen-top" class="screen">
            <div class="top-split">
                <div id="btn-jitsugi" class="top-half top-shuwa">
                    <div class="top-icon-circle top-icon-shuwa">
                        <div class="top-icon-text" style="color:#C26A54">実</div>
                    </div>
                    <div class="top-title" style="color:#9E5440">実技</div>
                    <div class="top-desc" style="color:rgba(158,84,64,.6)">手話表現の<br>実践トレーニング</div>
                    <div class="top-tags">
                        <div class="top-tag" style="color:#9E5440">スピーチ・基本単語</div>
                        <div class="top-tag" style="color:#9E5440">ストーリー・短文</div>
                    </div>
                </div>
                <div class="top-divider"></div>
                <div id="btn-hikki" class="top-half top-writing">
                    <div class="top-icon-circle top-icon-writing">
                        <div class="top-icon-text" style="color:#5471B8">筆</div>
                    </div>
                    <div class="top-title" style="color:#3E5694">筆記</div>
                    <div class="top-desc" style="color:rgba(62,86,148,.6)">語彙力と知識の<br>ペーパーテスト</div>
                    <div class="top-tags">
                        <div class="top-tag" style="color:#3E5694">4択問題・穴埋め</div>
                        <div class="top-tag" style="color:#3E5694">小論文</div>
                    </div>
                </div>
            </div>
            <div class="top-dashboard">
                <div class="top-stats">
                    <div class="top-stat-card">
                        <div class="top-stat-label">総学習数</div>
                        <div class="top-stat-value" id="stat-total">0</div>
                    </div>
                    <div class="top-stat-card">
                        <div class="top-stat-label">正答率</div>
                        <div class="top-stat-value" id="stat-accuracy" style="color:#5BAE6A">-</div>
                    </div>
                    <div class="top-stat-card">
                        <div class="top-stat-label">連続日数</div>
                        <div class="top-stat-value" id="stat-streak" style="color:#E8937E">-</div>
                    </div>
                </div>
                <div id="loading-msg" class="loading-msg" style="display:none">データを読み込み中...</div>
            </div>
        </div>

        <!-- SELECT PAGE -->
        <div id="screen-select" class="screen" style="display:none">
            <div id="select-band" class="select-band">
                <div id="select-icon" class="select-icon"></div>
                <div class="select-band-text">
                    <div id="select-title" class="select-title"></div>
                    <div id="select-subtitle" class="select-subtitle">出題条件を選択してください</div>
                </div>
                <div id="btn-back" class="select-back">戻る</div>
            </div>
            <div class="select-body">
                <!-- 年度 -->
                <div class="select-group">
                    <div class="select-label">
                        <div id="step-1" class="step-circle">1</div>
                        年度
                    </div>
                    <select id="year-select" class="select-dropdown">
                        <option value="">選択してください</option>
                        <option value="none">指定しない</option>
                    </select>
                </div>
                <!-- レベル -->
                <div class="select-group">
                    <div class="select-label">
                        <div id="step-2" class="step-circle disabled">2</div>
                        出題レベル
                    </div>
                    <select id="level-select" class="select-dropdown" disabled>
                        <option value="">選択してください</option>
                    </select>
                </div>
                <!-- タイプ -->
                <div class="select-group">
                    <div class="select-label">
                        <div id="step-3" class="step-circle disabled">3</div>
                        出題タイプ
                    </div>
                    <select id="type-select" class="select-dropdown" disabled>
                        <option value="">選択してください</option>
                    </select>
                </div>
                <!-- Info badge -->
                <div id="question-info" class="question-info" style="display:none">
                    この条件の問題数: <span id="question-count" style="font-weight:700"></span>
                </div>
                <div class="select-spacer"></div>
                <!-- Start button -->
                <div id="btn-start" class="btn-primary" style="display:none">
                    <div class="btn-primary-text">開始する</div>
                </div>
            </div>
        </div>

        <!-- QUESTION PAGE -->
        <div id="screen-question" class="screen" style="display:none">
            <div id="question-header" class="question-header">
                <div class="question-header-top">
                    <div id="progress-label" class="progress-label"></div>
                    <div id="remaining-label" class="remaining-label"></div>
                    <div id="btn-back-question" class="question-back">やめる</div>
                </div>
                <div class="progress-row">
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    </div>
                    <span id="progress-text" class="progress-text"></span>
                </div>
            </div>
            <div id="question-body" class="question-body"></div>
        </div>

        <!-- COMPLETE PAGE -->
        <div id="screen-complete" class="screen" style="display:none">
            <div class="complete-header">
                <div class="confetti c1"></div>
                <div class="confetti c2"></div>
                <div class="confetti c3"></div>
                <div class="confetti c4"></div>
                <div class="complete-title">お疲れ様でした</div>
                <div id="complete-subtitle" class="complete-subtitle"></div>
            </div>
            <div class="complete-body">
                <div class="complete-results">
                    <div id="score-circle" class="score-circle-wrap"></div>
                    <div class="result-stats">
                        <div class="result-stat-row">
                            <div class="result-icon correct-icon">&#10003;</div>
                            <div>
                                <div class="result-value" id="result-correct">0問</div>
                                <div class="result-label">正解</div>
                            </div>
                        </div>
                        <div class="result-stat-row">
                            <div class="result-icon wrong-icon">&#10007;</div>
                            <div>
                                <div class="result-value" id="result-wrong">0問</div>
                                <div class="result-label">不正解</div>
                            </div>
                        </div>
                        <div class="result-stat-row">
                            <div class="result-icon streak-icon">max</div>
                            <div>
                                <div class="result-value" id="result-maxstreak">0問</div>
                                <div class="result-label">最大連続正解</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="complete-spacer"></div>
                <div class="complete-buttons">
                    <div id="btn-retry" class="btn-primary">
                        <div class="btn-primary-text">もう一度チャレンジ</div>
                    </div>
                    <div id="btn-home" class="btn-secondary">
                        <div class="btn-secondary-text">トップに戻る</div>
                    </div>
                </div>
            </div>
        </div>
        <footer id="site-footer" class="site-footer">
            <div id="footer-top-link" class="footer-top-link">TOPに戻る</div>
            <div class="footer-copy">&copy; 魚館＜手話検定シミュレーター＞</div>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
